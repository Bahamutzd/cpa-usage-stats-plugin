name: auto-tag-release

# After main-branch CI succeeds, inspect the version declared in the two
# release-source files. If that version changed in the just-validated commit
# and the matching vX.Y.Z tag does not exist yet, push the tag, then explicitly
# dispatch release.yml to build and publish the GitHub release assets.
#
# Tags pushed with GITHUB_TOKEN do not trigger downstream push workflows, so
# this workflow dispatches release.yml directly after the tag exists. That keeps
# the release chain self-contained and avoids requiring a separate PAT secret.

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional git ref or SHA to inspect. Defaults to main."
        required: false

permissions:
  contents: write
  actions: write

jobs:
  tag:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow_dispatch target
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref != '' && github.event.inputs.ref || 'main' }}
          fetch-depth: 2
          persist-credentials: false

      - name: Checkout successful main commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Resolve version and tag intent
        id: version
        shell: bash
        run: |
          set -euo pipefail

          extract_config_version() {
            sed -n 's/.*Version:[[:space:]]*"\([^"]*\)".*/\1/p' "$1" | head -n 1
          }

          extract_registry_version() {
            sed -n 's/.*"version":[[:space:]]*"\([^"]*\)".*/\1/p' "$1" | head -n 1
          }

          CURRENT_CONFIG_VERSION="$(extract_config_version internal/plugin/config.go)"
          CURRENT_REGISTRY_VERSION="$(extract_registry_version plugins-store/registry.json)"

          if [ -z "${CURRENT_CONFIG_VERSION}" ] || [ -z "${CURRENT_REGISTRY_VERSION}" ]; then
            echo "::error::Failed to extract version from internal/plugin/config.go or plugins-store/registry.json."
            exit 1
          fi

          if [ "${CURRENT_CONFIG_VERSION}" != "${CURRENT_REGISTRY_VERSION}" ]; then
            echo "::error::Version mismatch: config.go=${CURRENT_CONFIG_VERSION}, registry.json=${CURRENT_REGISTRY_VERSION}."
            exit 1
          fi

          VERSION="${CURRENT_CONFIG_VERSION}"
          TAG="v${VERSION}"
          SHOULD_TAG="true"
          SHOULD_DISPATCH="false"
          REASON="version changed and tag missing"
          DISPATCH_REASON="release dispatch not needed"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            CHANGED_VERSION_FILES="$(git diff --name-only HEAD^ HEAD -- internal/plugin/config.go plugins-store/registry.json || true)"
            if [ -z "${CHANGED_VERSION_FILES}" ]; then
              SHOULD_TAG="false"
              REASON="version source files unchanged in the validated main commit"
            else
              PREVIOUS_CONFIG_VERSION="$(git show HEAD^:internal/plugin/config.go 2>/dev/null | sed -n 's/.*Version:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n 1 || true)"
              PREVIOUS_REGISTRY_VERSION="$(git show HEAD^:plugins-store/registry.json 2>/dev/null | sed -n 's/.*"version":[[:space:]]*"\([^"]*\)".*/\1/p' | head -n 1 || true)"
              if [ "${VERSION}" = "${PREVIOUS_CONFIG_VERSION}" ] && [ "${VERSION}" = "${PREVIOUS_REGISTRY_VERSION}" ]; then
                SHOULD_TAG="false"
                REASON="version files changed but version stayed the same"
              fi
            fi
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            SHOULD_TAG="false"
            REASON="tag already exists on origin"
          fi

          if [ "${SHOULD_TAG}" = "true" ]; then
            SHOULD_DISPATCH="true"
            DISPATCH_REASON="created missing tag and must trigger release.yml"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_DISPATCH="true"
            DISPATCH_REASON="manual rerun requested release dispatch for existing tag"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "should_tag=${SHOULD_TAG}" >> "$GITHUB_OUTPUT"
          echo "should_dispatch=${SHOULD_DISPATCH}" >> "$GITHUB_OUTPUT"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          echo "dispatch_reason=${DISPATCH_REASON}" >> "$GITHUB_OUTPUT"

          {
            echo "### Auto tag decision"
            echo ""
            echo "- Version: \`${VERSION}\`"
            echo "- Tag: \`${TAG}\`"
            echo "- Should tag: \`${SHOULD_TAG}\`"
            echo "- Reason: ${REASON}"
            echo "- Should dispatch release: \`${SHOULD_DISPATCH}\`"
            echo "- Dispatch reason: ${DISPATCH_REASON}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create and push release tag
        if: steps.version.outputs.should_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push origin "refs/tags/${TAG}"

      - name: Dispatch release workflow
        if: steps.version.outputs.should_dispatch == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: '${{ steps.version.outputs.tag }}',
              inputs: {
                version: '${{ steps.version.outputs.version }}',
              },
            });

            await core.summary
              .addHeading('Release dispatch')
              .addList([
                'Workflow: release.yml',
                'Ref: ${{ steps.version.outputs.tag }}',
                'Version: ${{ steps.version.outputs.version }}',
                'Reason: ${{ steps.version.outputs.dispatch_reason }}',
              ])
              .write();

      - name: Skip summary
        if: steps.version.outputs.should_tag != 'true' && steps.version.outputs.should_dispatch != 'true'
        run: |
          echo "Skip auto tag/release dispatch: ${{ steps.version.outputs.reason }}"
